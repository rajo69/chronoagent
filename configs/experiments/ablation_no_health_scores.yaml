# Ablation: health scoring off (Phase 10 task 10.5)
#
# Purpose: measure the contribution of the temporal health scoring layer
# that gates task allocation. Same MINJA attack + same seed/num_runs as
# main_experiment; ONLY ablation.health flips to false. When this flag
# is off, the allocator runs without per-agent health gating and degrades
# to round-robin on every task, which gives a paper-facing upper bound on
# how much work the health score is doing vs the raw signal layer.
#
# One-knob delta vs main_experiment: every other ablation flag stays true.
# Locked in by tests/unit/test_experiment_configs.py so the paper's
# ablation table has a clean row-per-knob structure.
#
# Validated by ExperimentConfig.from_yaml (see src/chronoagent/experiments/
# config_schema.py).

name: ablation_no_health_scores
seed: 42
num_runs: 5
num_prs: 25

attack:
  type: minja
  target: both
  injection_step: 10
  n_poison_docs: 10
  strategy: default

ablation:
  forecaster: true
  bocpd: true
  health: false
  integrity: true

system:
  llm_backend: mock
  bocpd_hazard_lambda: 50.0
  health_threshold: 0.3
  integrity_threshold: 0.6
